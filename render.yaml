services:
  - type: web
    name: django-chat-app
    env: python
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py migrate &&
      python manage.py collectstatic --no-input
    startCommand: gunicorn chattingapp.wsgi:application --bind 0.0.0.0:$PORT --workers 1

    envVars:
      - key: DATABASE_URL
        scope: all
      - key: SECRET_KEY
        scope: all
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,localhost"
      - key: PORT
        value: "8000"
